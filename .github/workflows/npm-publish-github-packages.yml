# This workflow will run tests using node and then publish a package to GitHub Packages when a release is created
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: Node.js Package

on:
  release:
    types: [created]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install server dependencies and run tests
        working-directory: ./server
        run: |
          npm ci
          npm test

      - name: Install client dependencies and run tests
        working-directory: ./client
        run: |
          npm ci
          npm test

  publish-gpr:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Publish step placeholder
        run: echo "Package publishing is not configured for this project. This job is a placeholder."
