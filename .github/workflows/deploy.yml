name: Deploy to Render

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  # Allow manual trigger from GitHub Actions UI

jobs:
  deploy:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render deploy hook
        # Set RENDER_DEPLOY_HOOK_URL in your repository Secrets:
        #   GitHub repo → Settings → Secrets → Actions → New repository secret
        #   Name:  RENDER_DEPLOY_HOOK_URL
        #   Value: (copy from Render dashboard → your service → Settings → Deploy Hook)
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "⚠️  RENDER_DEPLOY_HOOK_URL secret is not set."
            echo "    1. Go to Render dashboard → your service → Settings → Deploy Hook"
            echo "    2. Copy the URL"
            echo "    3. Add it as a GitHub secret named RENDER_DEPLOY_HOOK_URL"
            echo "    See: https://render.com/docs/deploy-hooks"
            exit 0
          fi
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "201" ]; then
            echo "✅ Render deploy triggered successfully (HTTP $HTTP_STATUS)"
          else
            echo "❌ Render deploy hook returned HTTP $HTTP_STATUS"
            exit 1
          fi
